name: build-and-cache
on:
  workflow_dispatch: # allows manual triggers
  push:
    branches:
      - main
    # only rebuild when something that affects a closure changes
    paths:
      - "flake.nix"
      - "flake.lock"
      - "lib/**"
      - "nix/**"
      - "overlays/**"
      - "secrets/**"
      - "nixvim/**"

permissions:
  contents: read

jobs:
  # macos-15 / macos-14 are Apple Silicon = aarch64-darwin, matching the work +
  # personal machines, so the cached store paths hit on pull.
  # (macos-13 is Intel — do not use it.)

  darwin:
    name: darwin (${{ matrix.profile }})
    runs-on: macos-15
    strategy:
      fail-fast: false
      matrix:
        profile: [work, personal]
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v15
        with:
          name: skinnyvans
          # with authToken set, every store path built in this job is pushed
          # to skinnyvans automatically — no explicit `cachix push` step.
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build ${{ matrix.profile }} system closure
        run: |
          nix build .#darwinConfigurations.${{ matrix.profile }}.system \
            --no-link --print-out-paths

  devshells:
    name: dev shells
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v15
        with:
          name: skinnyvans
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build all dev shell dependencies
        # Caching a dev shell = building its `.inputDerivation` (mkShell exposes
        # this exactly for CI). We can't `nix develop` here because the shellHook
        # does `exec fish`. Names are enumerated so new shells / nodejs_* versions
        # are picked up automatically.
        # Some enumerated shells (e.g. EOL nodejs_* versions) are marked insecure
        # and refuse to evaluate — caching them wouldn't help anyway, since the
        # same check fires on the user's machine. So skip failures (surfaced as
        # warnings) and only fail the job if nothing builds at all.
        run: |
          system="aarch64-darwin"
          # Building these takes a long time and they aren't used day-to-day,
          # so skip them in CI.
          skip="nodejs_25-dev nodejs_26-dev"
          names=$(nix eval --json ".#devShells.$system" --apply builtins.attrNames | jq -r '.[]')
          ok=0; skipped=""
          for name in $names; do
            if echo " $skip " | grep -q " $name "; then
              echo "::warning::skipped devShell '$name' — excluded from CI (slow build)"
              skipped="$skipped $name"
              continue
            fi
            echo "::group::devShell $name"
            if nix build ".#devShells.$system.$name.inputDerivation" \
                 --no-link --print-out-paths; then
              ok=$((ok + 1))
            else
              echo "::warning::skipped devShell '$name' — failed to build (e.g. insecure/EOL package)"
              skipped="$skipped $name"
            fi
            echo "::endgroup::"
          done
          [ -n "$skipped" ] && echo "::warning title=dev shells skipped::$skipped"
          if [ "$ok" -eq 0 ]; then
            echo "::error::no dev shells could be built"
            exit 1
          fi
          echo "cached $ok dev shell(s); skipped:${skipped:- none}"

  nixvim:
    name: nixvim
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v22
      - uses: cachix/cachix-action@v15
        with:
          name: skinnyvans
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
      - name: Build nixvim package
        # nixvim is a separate sub-flake with its own flake.lock.
        run: |
          nix build ./nixvim#packages.aarch64-darwin.default \
            --no-link --print-out-paths
